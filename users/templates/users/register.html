<!DOCTYPE html>
<html lang="en">
{% extends 'base.html' %}
{% block content %}
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <style>
        .registration-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .form-field {
            margin-bottom: 15px;
        }
        .form-field input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="registration-container">
        <h2 style="text-align: center;">Регистрация</h2>

        {% if error %}
            <div class="error-message">{{ error|safe }}</div>
        {% endif %}

        <form method="post" >
            {% csrf_token %}

            <div class="form-field">
                <input type="text" name="username" placeholder="Никнейм" required>
            </div>

            <div class="form-field">
                <input type="email" name="email" placeholder="Почта" required>
            </div>

            <div class="form-field">
                <input type="password" name="password1" placeholder="Пароль (минимум 5 символов)" minlength="5" required>
            </div>

            <div class="form-field">
                <input type="password" name="password2" placeholder="Повторите пароль" minlength="5" required>
            </div>

            <div class="form-field">
                <div class="g-recaptcha" data-sitekey="{{ RECAPTCHA_PUBLIC_KEY }}"></div>
                <script src="https://www.google.com/recaptcha/api.js"></script>
            </div>

            <button type="submit" style="width: 100%; padding: 10px;">Зарегистрироваться</button>
        </form>
        <div style="text-align: center; margin-top: 15px;">
            Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
        </div>
    </div>
</body>
<script src='https://www.google.com/recaptcha/api.js?render={{ RECAPTCHA_PUBLIC_KEY }}'></script>
<script>
    function togglePassword(icon) {
        const input = icon.previousElementSibling;
        const type = input.type === 'password' ? 'text' : 'password';
        input.type = type;
        icon.classList.toggle('show');
    }
    // Добавляем токен reCAPTCHA в форму перед отправкой
    document.getElementById('registration-form').addEventListener('submit', function(e) {
        e.preventDefault();
        grecaptcha.ready(function() {
            grecaptcha.execute('{{ RECAPTCHA_PUBLIC_KEY }}', {action: 'register'}).then(function(token) {
                document.getElementById('g-recaptcha-response').value = token;
                document.getElementById('registration-form').submit();
            });
        });
    });

    // Активация кнопки при заполнении формы
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.querySelector('form');
        const submitButton = form.querySelector('button[type="submit"]');
        const inputs = form.querySelectorAll('input[required]');

        function checkForm() {
            let allFilled = true;
            inputs.forEach(input => {
                if (!input.value.trim()) {
                    allFilled = false;
                }
            });
            submitButton.disabled = !allFilled;
        }

        inputs.forEach(input => {
            input.addEventListener('input', checkForm);
        });

        // Инициализация состояния кнопки
        checkForm();
    });
</script>
{% endblock %}
</html>
