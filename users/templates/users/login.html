<!DOCTYPE html>
<html lang="en">
{% extends 'base.html' %}
{% block content %}
<head>
    <meta charset="UTF-8">
    <title>Вход в аккаунт</title>
    <style>
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .form-field {
            margin-bottom: 15px;
        }
        .form-field input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .form-link {
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2 style="text-align: center;">Вход в аккаунт</h2>
        <form method="post">
            {% csrf_token %}
            {% if form.errors %}
                <p style="color: red">Неверное имя пользователя или пароль.</p>
            {% endif %}
            <div class="form-field">
                <input type="text" name="username" placeholder="Никнейм" required>
            </div>
            <div class="form-field password-container">
                <input type="password" name="password" id="password" placeholder="Пароль" required>
                <span class="toggle-password" onclick="togglePassword(this)"></span>
            </div>
            <button type="submit" style="width: 100%; padding: 10px;">Войти</button>
        </form>
        <div class="form-link">
            Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
        </div>
    </div>
</body>
<script>
function togglePassword(icon) {
    const input = icon.previousElementSibling;
    const type = input.type === 'password' ? 'text' : 'password';
    input.type = type;
    icon.classList.toggle('show');
}

// Активация кнопки при заполнении формы
document.addEventListener('DOMContentLoaded', function() {
    const form = document.querySelector('form');
    const submitButton = form.querySelector('button[type="submit"]');
    const inputs = form.querySelectorAll('input[required]');

    function checkForm() {
        let allFilled = true;
        inputs.forEach(input => {
            if (!input.value.trim()) {
                allFilled = false;
            }
        });
        submitButton.disabled = !allFilled;
    }

    inputs.forEach(input => {
        input.addEventListener('input', checkForm);
    });

    // Инициализация состояния кнопки
    checkForm();
});
</script>
{% endblock %}
</html>
